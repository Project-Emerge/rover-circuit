name: KiCad CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  check:
    name: Check KiCad Project
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
    
      - name: Run KiCad actions
        uses: actions-for-kicad/kicad-actions@v2.4-k10.0
        with:
          schematic_file_name: ./rover-circuit.kicad_sch
          # symbol_libraries: "symbol-library=./symbol-library.kicad_sym"
          run_erc: false
          schematic_output_pdf: true
          schematic_output_pdf_file_name: rover-circuit-schematic.pdf
    
          pcb_file_name: ./rover-circuit.kicad_pcb
          # footprint_libraries: "footprint-library=./footprint-library.pretty"
          run_drc: true
          pcb_output_gerbers_and_drill: true
          pcb_output_image: true
          pcb_output_image_file_name: rover-circuit-pcb-render.png

          pcb_output_step: true
          pcb_output_step_file_name: rover-circuit.step
    
      - name: Upload schematic
        uses: actions/upload-artifact@v4
        with:
          name: Schematic
          path: ./rover-circuit-schematic.pdf
    
      - name: Upload gerbers and drill file
        uses: actions/upload-artifact@v4
        with:
          name: Gerbers
          path: ./gerbers
    
      - name: Upload image render
        uses: actions/upload-artifact@v4
        with:
          name: Image-render
          path: ./rover-circuit-pcb-render.png

      - name: Upload STEP file
        uses: actions/upload-artifact@v4
        with:
          name: STEP
          path: ./rover-circuit.step

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      
      - name: Create release tag
        id: create_tag
        run: |
          TAG_NAME="v$(date +'%Y.%m.%d')-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
      
      - name: Create gerbers archive
        run: |
          cd ./artifacts/Gerbers
          zip -r ../../rover-circuit-gerbers.zip .
      
      - name: Create release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.create_tag.outputs.tag_name }}
          name: Rover Circuit ${{ steps.create_tag.outputs.tag_name }}
          body: |
            ## Hardware Release: Rover Circuit
            
            This is an automated release containing manufacturing files, 3D models, and documentation generated from commit ${{ github.sha }}.
            
            ### 📂 Release Assets
            
            * 🔧 **Manufacturing Files** (`rover-circuit-gerbers.zip`)
              Standard Gerber and EXCELLON drill files ready for PCB fabrication.
            
            * 📐 **Mechanical CAD** (`rover-circuit.step`)
              3D STEP model for mechanical integration, interference checking, and enclosure design.
            
            * 📄 **Schematic** (`rover-circuit-schematic.pdf`)
              Complete circuit schematic for reference, review, and debugging.
            
            * 🖼️ **Board Render** (`rover-circuit-pcb-render.png`)
              High-resolution 3D render of the assembled printed circuit board.
            
            ---
            *Generated automatically by KiCad CI/CD Workflow*
          files: |
            ./artifacts/Schematic/rover-circuit-schematic.pdf
            ./rover-circuit-gerbers.zip
            ./artifacts/Image-render/rover-circuit-pcb-render.png
            ./artifacts/STEP/rover-circuit.step
          draft: false
          prerelease: false
